title: Milano
slug: milano
aliases: [milan]
description: |
  Places I've tried and liked in Milan. Mostly bars, restaurants, bakeries, and spots
  worth visiting. Updated as I go back.
tips: |
  - **Getting around**: Metro + tram cover most of the city. Bike sharing (BikeMi) works well for short hops.
  - **Aperitivo**: Standard aperitivo hour is 18:00–21:00. Many bars include food with drinks — Navigli and Isola are the best areas for this.
  - **Navigli vs Brera**: Navigli is louder and younger; Brera is quieter and more expensive. Both are good, depends on what you want.
  - **Weekends**: Museums are crowded Saturday afternoons. Go early or pick a weekday.
  - **Coffee rule**: Don't order a cappuccino after 11:00 if you care about blending in.
  - **Day trips**: Como, Bergamo, and Lago d'Iseo are all under 1h by train. Worth a full day each.

