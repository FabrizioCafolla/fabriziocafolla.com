title: Latina
slug: latina
description: |
  Restaurants, bars, day trips, and sights in the Latina province.
  Covers the coast (Sabaudia, Sperlonga, Gaeta), the hill towns (Sermoneta, Norma, Cori),
  and the city itself.
tips: |
  - **Best time to visit**: April through September. Summers are hot — coast gets packed in August.
  - **You need a car**: Public transport between towns is slow and unreliable. Rent a car or bring yours.
  - **Festivals**: Most towns run sagre (food festivals) from June to September. Check local calendars.
  - **Beaches**: Sabaudia has long sandy beaches; Sperlonga and San Felice Circeo have coves. Arrive early in summer.
  - **Ponza**: Reachable by ferry from Terracina or Formia. Book ahead in July/August — ferries fill up fast.
  - **Hill towns**: Sermoneta, Norma, and Cori are all within 20 min of each other. Combine them in one morning.
  - **Wine**: The area around Cori and the Lepini hills produces solid reds (Nero Buono). Cincinnato is the best known winery.

